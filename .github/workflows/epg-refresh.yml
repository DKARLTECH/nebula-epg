name: EPG Refresh

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EPG_SOURCE_URL: ${{ vars.EPG_SOURCE_URL }}
      CHANNEL_IDS:    ${{ vars.CHANNEL_IDS }}
      RELEASE_TAG:    latest-epg
      ASSET_NAME:     epg.xml.gz
      OUTPUT_FILE:    /tmp/epg.xml.gz

    steps:
      - name: Validate EPG_SOURCE_URL
        run: |
          if [ -z "$EPG_SOURCE_URL" ]; then
            echo "::error::EPG_SOURCE_URL variable is not set."
            exit 1
          fi
          echo "Source URL: $EPG_SOURCE_URL"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download raw EPG
        run: |
          python3 - <<'PYEOF'
          import urllib.request, os, sys
          url      = os.environ["EPG_SOURCE_URL"]
          raw_path = "/tmp/epg_raw"
          print(f"Fetching {url} ...")
          req = urllib.request.Request(url, headers={"User-Agent": "NebulaIPTV-GHAction/1.0"})
          try:
              with urllib.request.urlopen(req, timeout=120) as resp, open(raw_path, "wb") as f:
                  total = 0
                  while True:
                      chunk = resp.read(1024 * 1024)
                      if not chunk:
                          break
                      f.write(chunk)
                      total += len(chunk)
                  print(f"Downloaded {total / 1_048_576:.1f} MB")
          except Exception as e:
              print(f"::error::Download failed: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Filter and gzip-compress EPG
        run: |
          python3 - <<'PYEOF'
          import gzip, os, re, sys
          from datetime import datetime, timezone, timedelta

          RAW_PATH    = "/tmp/epg_raw"
          OUTPUT_PATH = os.environ["OUTPUT_FILE"]
          CHANNEL_IDS = os.environ.get("CHANNEL_IDS", "")
          PAST_HOURS   = 72
          FUTURE_HOURS = 168

          if CHANNEL_IDS.strip():
              id_set = {s.strip().lower() for s in CHANNEL_IDS.split(",") if s.strip()}
              print(f"Channel filter: {len(id_set)} ids")
          else:
              id_set = set()
              print("Channel filter: disabled")

          has_id_filter = bool(id_set)
          now       = datetime.now(timezone.utc)
          win_start = now - timedelta(hours=PAST_HOURS)
          win_end   = now + timedelta(hours=FUTURE_HOURS)

          def parse_xmltv_date(s):
              if not s or len(s) < 14:
                  return None
              try:
                  s = s.strip()
                  dt = datetime(int(s[0:4]),int(s[4:6]),int(s[6:8]),
                                int(s[8:10]),int(s[10:12]),int(s[12:14]),
                                tzinfo=timezone.utc)
                  if len(s) >= 20:
                      tz = s[14:].strip()
                      if len(tz) >= 5 and tz[0] in ("+","-"):
                          sign = -1 if tz[0]=="-" else 1
                          off  = timedelta(hours=int(tz[1:3]),minutes=int(tz[3:5]))
                          dt  -= sign * off
                  return dt
              except:
                  return None

          def get_attr(tag, attr):
              m = re.search(rf'{re.escape(attr)}\s*=\s*["\']([^"\']*)["\']', tag, re.IGNORECASE)
              return m.group(1) if m else ""

          STRIP_PATTERNS = [
              re.compile(r'<credits>[\s\S]*?</credits>', re.IGNORECASE),
              re.compile(r'<star-rating>[\s\S]*?</star-rating>', re.IGNORECASE),
              re.compile(r'<review[^>]*>[\s\S]*?</review>', re.IGNORECASE),
              re.compile(r'<video>[\s\S]*?</video>', re.IGNORECASE),
              re.compile(r'<audio>[\s\S]*?</audio>', re.IGNORECASE),
              re.compile(r'<country[^>]*>[\s\S]*?</country>', re.IGNORECASE),
              re.compile(r'<language>[\s\S]*?</language>', re.IGNORECASE),
              re.compile(r'<previously-shown[^/]*/?>',re.IGNORECASE),
              re.compile(r'<subtitles[^>]*>[\s\S]*?</subtitles>',re.IGNORECASE),
              re.compile(r'<icon\s+src="http[^"]*"[^/]*/?>',re.IGNORECASE),
          ]

          def strip_meta(block):
              for p in STRIP_PATTERNS:
                  block = p.sub("", block)
              return block

          with open(RAW_PATH,"rb") as f:
              magic = f.read(2)
          is_gz = (magic == b'\x1f\x8b')
          open_fn = gzip.open if is_gz else open

          channel_buf   = []
          surviving_ids = set()
          programme_buf = []
          preamble_lines = []
          preamble_done  = False
          in_channel = in_programme = False
          block_lines = []
          ch_kept = ch_drop = pr_kept = pr_drop = 0

          def flush_ch(block):
              tag_end = block.find(">")
              tag = block[:tag_end] if tag_end>=0 else block
              cid = get_attr(tag,"id")
              channel_buf.append((cid.lower(), strip_meta(block)))

          def flush_pr(block):
              global pr_kept, pr_drop
              tag_end = block.find(">")
              tag = block[:tag_end] if tag_end>=0 else block
              ch_id    = get_attr(tag,"channel")
              start_dt = parse_xmltv_date(get_attr(tag,"start"))
              stop_dt  = parse_xmltv_date(get_attr(tag,"stop"))
              if not((stop_dt is None or stop_dt>win_start) and (start_dt is None or start_dt<win_end)):
                  pr_drop+=1; return
              if has_id_filter and ch_id.lower() not in id_set:
                  pr_drop+=1; return
              pr_kept+=1
              surviving_ids.add(ch_id.lower())
              programme_buf.append(strip_meta(block))

          try:
              with open_fn(RAW_PATH,"rt",encoding="utf-8",errors="replace") as fh:
                  for line in fh:
                      s = line.strip()
                      lo = s.lower()
                      if not in_channel and not in_programme:
                          if lo.startswith("<channel"):
                              preamble_done=True; in_channel=True; block_lines=[s]
                              if "</channel>" in lo or lo.endswith("/>"):
                                  flush_ch("\n".join(block_lines)); in_channel=False; block_lines=[]
                              continue
                          if lo.startswith("<programme"):
                              preamble_done=True; in_programme=True; block_lines=[s]
                              if "</programme>" in lo or lo.endswith("/>"):
                                  flush_pr("\n".join(block_lines)); in_programme=False; block_lines=[]
                              continue
                          if not preamble_done and not lo.startswith("</tv"):
                              preamble_lines.append(s)
                          continue
                      block_lines.append(s)
                      if in_channel and "</channel>" in lo:
                          flush_ch("\n".join(block_lines)); in_channel=False; block_lines=[]
                      elif in_programme and "</programme>" in lo:
                          flush_pr("\n".join(block_lines)); in_programme=False; block_lines=[]
          except Exception as e:
              print(f"::error::Parse failed: {e}",file=sys.stderr); sys.exit(1)

          for (cid_lower,text) in channel_buf:
              if not has_id_filter or cid_lower in surviving_ids:
                  ch_kept+=1; preamble_lines.append(text)
              else:
                  ch_drop+=1

          with gzip.open(OUTPUT_PATH,"wt",encoding="utf-8",compresslevel=6) as gz:
              gz.write("\n".join(preamble_lines)+"\n")
              for p in programme_buf:
                  gz.write(p+"\n")
              gz.write("</tv>\n")

          size_mb = os.path.getsize(OUTPUT_PATH)/1_048_576
          print(f"channels kept={ch_kept} dropped={ch_drop}")
          print(f"programs kept={pr_kept} dropped={pr_drop}")
          print(f"Output: {size_mb:.2f} MB")
          PYEOF

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "EPG Cache (auto-updated)" \
              --notes "Auto-updated every 12 hours." \
              --prerelease
          fi
          gh release delete-asset "$RELEASE_TAG" "$ASSET_NAME" \
            --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release upload "$RELEASE_TAG" "$OUTPUT_FILE#$ASSET_NAME" \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "Asset live at:"
          echo "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$ASSET_NAME"
